<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>GameCoreLogicLab - 回放查看器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #111827; color: #e5e7eb; display: flex; flex-direction: column; height: 100vh; }

/* 顶部控制栏 */
#controls {
  padding: 10px 16px; background: #1f2937; border-bottom: 2px solid #374151;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#controls button {
  background: #374151; border: 1px solid #4b5563; color: #e5e7eb;
  padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 13px;
}
#controls button:hover { background: #4b5563; }
#controls button.active { background: #2563eb; border-color: #3b82f6; }
#timeline { flex: 1; accent-color: #3b82f6; }
#tick-display { min-width: 120px; text-align: center; color: #60a5fa; font-weight: bold; }
#speed-group { display: flex; gap: 4px; align-items: center; }
#speed-group label { color: #9ca3af; font-size: 12px; }
#speed { background: #374151; border: 1px solid #4b5563; color: #e5e7eb; padding: 3px 6px; border-radius: 4px; }

/* 主体区域 */
#main { display: flex; flex: 1; overflow: hidden; }

/* 左栏：事件日志 */
#event-panel { width: 280px; border-right: 2px solid #374151; display: flex; flex-direction: column; flex-shrink: 0; }
#event-panel .panel-header { padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151; font-size: 13px; color: #9ca3af; font-weight: bold; }
#event-log { flex: 1; overflow-y: auto; padding: 6px; font-size: 12px; }
.tick-group { margin-bottom: 2px; }
.tick-header {
  color: #60a5fa; font-weight: bold; cursor: pointer; padding: 3px 6px;
  border-radius: 3px; font-size: 12px; display: flex; align-items: center; gap: 6px;
}
.tick-header:hover { background: #1f2937; }
.tick-header.active { background: #1e3a5f; border-left: 3px solid #3b82f6; }
.tick-header .tick-num { min-width: 50px; }
.tick-header .tick-summary { color: #6b7280; font-weight: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tick-event { padding: 1px 6px 1px 24px; color: #d1d5db; font-size: 11px; }
.tick-diff { padding: 1px 6px 1px 30px; color: #4ade80; font-size: 11px; }
.tick-diff.negative { color: #f87171; }

/* 中栏：可视化 */
#viz-panel { flex: 1; display: flex; flex-direction: column; }

/* 空间画布 */
#canvas-section { flex: 1; position: relative; border-bottom: 2px solid #374151; }
#canvas-section .panel-header { position: absolute; top: 0; left: 0; right: 0; padding: 6px 12px; background: rgba(31,41,55,0.85); z-index: 1; font-size: 13px; color: #9ca3af; font-weight: bold; }
#spatial-canvas { width: 100%; height: 100%; background: #0f172a; }
#no-spatial { display: flex; align-items: center; justify-content: center; height: 100%; color: #4b5563; font-size: 14px; background: #0f172a; }

/* 数值图表 */
#chart-section { height: 200px; border-bottom: 2px solid #374151; position: relative; }
#chart-section .panel-header { padding: 6px 12px; background: #1f2937; border-bottom: 1px solid #374151; font-size: 13px; color: #9ca3af; font-weight: bold; }
#chart-canvas { width: 100%; height: calc(100% - 30px); background: #0f172a; }

/* 右栏：状态面板 */
#state-panel { width: 320px; border-left: 2px solid #374151; display: flex; flex-direction: column; flex-shrink: 0; }
#state-panel .panel-header { padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151; font-size: 13px; color: #9ca3af; font-weight: bold; }
#state-content { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 12px; }
.state-entity { margin-bottom: 10px; border: 1px solid #374151; border-radius: 4px; overflow: hidden; }
.state-entity-header { background: #1f2937; padding: 4px 8px; font-weight: bold; color: #60a5fa; font-size: 12px; display: flex; justify-content: space-between; cursor: pointer; }
.state-entity-header .entity-badge { background: #374151; padding: 1px 6px; border-radius: 8px; font-size: 10px; color: #9ca3af; }
.state-entity-body { padding: 4px 8px; }
.state-row { display: flex; justify-content: space-between; padding: 1px 0; border-bottom: 1px solid #1f2937; }
.state-key { color: #9ca3af; }
.state-val { color: #e5e7eb; }
.state-changed { color: #fbbf24; font-weight: bold; }
.state-increased { color: #4ade80; }
.state-decreased { color: #f87171; }

/* 底部状态栏 */
#status-bar { padding: 4px 16px; background: #1f2937; border-top: 1px solid #374151; font-size: 11px; color: #6b7280; display: flex; gap: 20px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="controls">
  <button id="btn-start" title="跳到开头">⏮</button>
  <button id="btn-prev" title="上一 tick">◀</button>
  <button id="btn-play" title="播放/暂停">▶</button>
  <button id="btn-next" title="下一 tick">▶</button>
  <button id="btn-end" title="跳到末尾">⏭</button>
  <input type="range" id="timeline" min="0" value="0">
  <span id="tick-display">tick 0 / 0</span>
  <div id="speed-group">
    <label>速度:</label>
    <select id="speed">
      <option value="500">2 tps</option>
      <option value="200">5 tps</option>
      <option value="100">10 tps</option>
      <option value="33" selected>30 tps</option>
      <option value="16">60 tps</option>
      <option value="8">120 tps</option>
      <option value="1">最大</option>
    </select>
  </div>
</div>

<div id="main">
  <div id="event-panel">
    <div class="panel-header">事件日志</div>
    <div id="event-log"></div>
  </div>

  <div id="viz-panel">
    <div id="canvas-section">
      <div class="panel-header">空间视图</div>
      <canvas id="spatial-canvas"></canvas>
      <div id="no-spatial">未检测到空间数据（Position 字段）</div>
    </div>
    <div id="chart-section">
      <div class="panel-header">数值趋势</div>
      <canvas id="chart-canvas"></canvas>
    </div>
  </div>

  <div id="state-panel">
    <div class="panel-header">实体状态 <span id="state-tick-label"></span></div>
    <div id="state-content"></div>
  </div>
</div>

<div id="status-bar">
  <span id="status-total"></span>
  <span id="status-violations"></span>
  <span id="status-result"></span>
</div>

<script>
/*__REPLAY_DATA__*/

const data = (typeof REPLAY_DATA !== 'undefined') ? REPLAY_DATA : {ticks: [], total_ticks: 0};
let currentTick = 0;
let playing = false;
let playTimer = null;
let hasSpatial = false;
let numericPaths = [];

const $ = id => document.getElementById(id);
const timeline = $('timeline');
const tickDisplay = $('tick-display');
const eventLog = $('event-log');
const stateContent = $('state-content');
const spatialCanvas = $('spatial-canvas');
const chartCanvas = $('chart-canvas');
const noSpatial = $('no-spatial');

timeline.max = Math.max(0, data.total_ticks - 1);

// 状态栏
$('status-total').textContent = `总 ticks: ${data.total_ticks}`;
const vCount = (data.invariant_violations || []).length;
$('status-violations').textContent = `不变量违反: ${vCount}`;
$('status-result').textContent = data.passed ? '✓ 通过' : '✗ 未通过';
$('status-result').style.color = data.passed ? '#4ade80' : '#f87171';

// ========== 数据分析 ==========
function analyzeData() {
  if (!data.ticks.length) return;
  const sample = data.ticks[0].state_after;
  hasSpatial = detectSpatial(sample);
  noSpatial.style.display = hasSpatial ? 'none' : 'flex';
  spatialCanvas.style.display = hasSpatial ? 'block' : 'none';
  numericPaths = detectNumericPaths(sample).slice(0, 8);
}

function detectSpatial(obj) {
  if (!obj || typeof obj !== 'object') return false;
  if ('x' in obj && 'y' in obj && typeof obj.x === 'number') return true;
  for (const v of Object.values(obj)) {
    if (typeof v === 'object' && v !== null) {
      if (Array.isArray(v)) { for (const item of v) if (detectSpatial(item)) return true; }
      else if (detectSpatial(v)) return true;
    }
  }
  return false;
}

function detectNumericPaths(obj, prefix = '', result = []) {
  if (!obj || typeof obj !== 'object') return result;
  for (const [k, v] of Object.entries(obj)) {
    const p = prefix ? prefix + '.' + k : k;
    if (typeof v === 'number') result.push(p);
    else if (typeof v === 'object' && v !== null && !Array.isArray(v)) detectNumericPaths(v, p, result);
  }
  return result;
}

function getVal(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : null, obj);
}

// ========== 事件日志 ==========
function renderEventLog() {
  let html = '';
  for (const tick of data.ticks) {
    const isActive = tick.tick === currentTick;
    const cls = isActive ? ' active' : '';
    const summary = (tick.events || []).length ? tick.events[0].substring(0, 30) : '';
    html += `<div class="tick-group">`;
    html += `<div class="tick-header${cls}" onclick="goToTick(${tick.tick})"><span class="tick-num">tick ${tick.tick}</span><span class="tick-summary">${escHtml(summary)}</span></div>`;
    if (isActive) {
      for (const ev of tick.events || []) html += `<div class="tick-event">${escHtml(ev)}</div>`;
      for (const d of diffObj(tick.state_before, tick.state_after).slice(0, 15)) {
        const cls2 = d.includes('→') && parseFloat(d.split('→')[1]) < parseFloat(d.split('→')[0].split(':').pop()) ? ' negative' : '';
        html += `<div class="tick-diff${cls2}">${escHtml(d)}</div>`;
      }
    }
    html += `</div>`;
  }
  eventLog.innerHTML = html;
  const active = eventLog.querySelector('.active');
  if (active) active.scrollIntoView({block: 'nearest', behavior: 'smooth'});
}

// ========== 状态面板 ==========
function renderState() {
  if (!data.ticks.length) { stateContent.innerHTML = '无数据'; return; }
  const tick = data.ticks[currentTick];
  if (!tick) return;
  $('state-tick-label').textContent = `(tick ${currentTick})`;
  const state = tick.state_after;
  const prev = tick.state_before;
  stateContent.innerHTML = buildStateHtml(state, prev);
}

function buildStateHtml(state, prev) {
  // 尝试识别实体列表（数组型）或单一状态
  let html = '';
  for (const [k, v] of Object.entries(state)) {
    if (Array.isArray(v) && v.length > 0 && typeof v[0] === 'object') {
      // 实体列表
      const prevArr = prev ? prev[k] || [] : [];
      for (let i = 0; i < v.length; i++) {
        const entity = v[i];
        const prevEntity = prevArr[i] || {};
        const label = entity.name || entity.id || `${k}[${i}]`;
        html += renderEntityCard(label, entity, prevEntity, i);
      }
    } else if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
      const prevV = prev ? prev[k] || {} : {};
      html += renderEntityCard(k, v, prevV, 0);
    } else {
      const prevV = prev ? prev[k] : undefined;
      const changed = JSON.stringify(v) !== JSON.stringify(prevV);
      const cls = changed ? getChangeClass(prevV, v) : '';
      html += `<div class="state-row"><span class="state-key">${k}</span><span class="state-val${cls}">${JSON.stringify(v)}</span></div>`;
    }
  }
  return html;
}

function renderEntityCard(label, entity, prevEntity, colorIdx) {
  const colors = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];
  const color = colors[colorIdx % colors.length];
  let html = `<div class="state-entity">`;
  html += `<div class="state-entity-header" style="border-left:3px solid ${color}"><span>${escHtml(String(label))}</span></div>`;
  html += `<div class="state-entity-body">`;
  for (const [k, v] of Object.entries(entity)) {
    if (typeof v === 'object' && v !== null) continue; // 跳过嵌套对象
    const prevV = prevEntity[k];
    const changed = JSON.stringify(v) !== JSON.stringify(prevV);
    const cls = changed ? getChangeClass(prevV, v) : '';
    html += `<div class="state-row"><span class="state-key">${k}</span><span class="state-val${cls}">${v}</span></div>`;
  }
  html += `</div></div>`;
  return html;
}

function getChangeClass(prevV, newV) {
  if (typeof prevV === 'number' && typeof newV === 'number') {
    return newV > prevV ? ' state-increased' : newV < prevV ? ' state-decreased' : ' state-changed';
  }
  return ' state-changed';
}

// ========== 空间渲染 ==========
function renderSpatial() {
  if (!hasSpatial || !data.ticks.length) return;
  const ctx = spatialCanvas.getContext('2d');
  const rect = spatialCanvas.parentElement.getBoundingClientRect();
  spatialCanvas.width = rect.width;
  spatialCanvas.height = rect.height - 30;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, spatialCanvas.width, spatialCanvas.height);

  const allPos = [];
  for (const tick of data.ticks) collectPositions(tick.state_after, allPos);
  if (!allPos.length) return;

  const pad = 40;
  const minX = Math.min(...allPos.map(p => p.x)) - 5;
  const maxX = Math.max(...allPos.map(p => p.x)) + 5;
  const minY = Math.min(...allPos.map(p => p.y)) - 5;
  const maxY = Math.max(...allPos.map(p => p.y)) + 5;
  const w = spatialCanvas.width - pad * 2;
  const h = spatialCanvas.height - pad * 2;
  const scale = Math.min(w / (maxX - minX || 1), h / (maxY - minY || 1));
  const ox = pad + (w - (maxX - minX) * scale) / 2;
  const oy = pad + (h - (maxY - minY) * scale) / 2;
  const toS = (x, y) => [ox + (x - minX) * scale, oy + (y - minY) * scale];

  // 网格
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let gx = Math.floor(minX); gx <= Math.ceil(maxX); gx += Math.ceil((maxX - minX) / 10) || 1) {
    const [sx] = toS(gx, 0);
    ctx.beginPath(); ctx.moveTo(sx, pad); ctx.lineTo(sx, spatialCanvas.height - pad); ctx.stroke();
  }
  for (let gy = Math.floor(minY); gy <= Math.ceil(maxY); gy += Math.ceil((maxY - minY) / 10) || 1) {
    const [, sy] = toS(0, gy);
    ctx.beginPath(); ctx.moveTo(pad, sy); ctx.lineTo(spatialCanvas.width - pad, sy); ctx.stroke();
  }

  const colors = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];

  // 轨迹线
  for (let t = 0; t <= currentTick; t++) {
    const pos = []; collectPositions(data.ticks[t].state_after, pos);
    const posPrev = []; collectPositions(data.ticks[t].state_before, posPrev);
    const alpha = 0.1 + 0.3 * (t / Math.max(1, currentTick));
    for (let i = 0; i < Math.min(pos.length, posPrev.length); i++) {
      ctx.strokeStyle = colors[i % colors.length] + Math.round(alpha * 255).toString(16).padStart(2, '0');
      ctx.lineWidth = 1.5;
      const [x1, y1] = toS(posPrev[i].x, posPrev[i].y);
      const [x2, y2] = toS(pos[i].x, pos[i].y);
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
  }

  // 当前实体
  const curPos = []; collectPositions(data.ticks[currentTick].state_after, curPos);
  curPos.forEach((p, i) => {
    const [sx, sy] = toS(p.x, p.y);
    const color = colors[i % colors.length];
    // 外圈光晕
    ctx.fillStyle = color + '33';
    ctx.beginPath(); ctx.arc(sx, sy, 14, 0, Math.PI * 2); ctx.fill();
    // 实体圆点
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill();
    // 边框
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.stroke();
    // 标签
    const label = p.label || `#${i}`;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(label, sx + 12, sy - 8);
    // 坐标
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px monospace';
    ctx.fillText(`(${p.x.toFixed(1)}, ${p.y.toFixed(1)})`, sx + 12, sy + 4);
  });
}

function collectPositions(obj, result, label) {
  if (!obj || typeof obj !== 'object') return;
  if ('x' in obj && 'y' in obj && typeof obj.x === 'number') {
    result.push({x: obj.x, y: obj.y, label: label || obj.name || obj.id || ''});
    return;
  }
  for (const [k, v] of Object.entries(obj)) {
    if (Array.isArray(v)) v.forEach((item, i) => collectPositions(item, result, item?.name || item?.id || `${k}[${i}]`));
    else if (typeof v === 'object' && v !== null) collectPositions(v, result, v?.name || v?.id || k);
  }
}

// ========== 数值图表 ==========
function renderChart() {
  if (!numericPaths.length || !data.ticks.length) return;
  const ctx = chartCanvas.getContext('2d');
  const rect = chartCanvas.parentElement.getBoundingClientRect();
  chartCanvas.width = rect.width;
  chartCanvas.height = rect.height - 30;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, chartCanvas.width, chartCanvas.height);

  const colors = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];
  const pad = {top: 15, right: 100, bottom: 25, left: 55};
  const w = chartCanvas.width - pad.left - pad.right;
  const h = chartCanvas.height - pad.top - pad.bottom;

  let allVals = [];
  const series = numericPaths.map((field, fi) => {
    const values = data.ticks.map(t => getVal(t.state_after, field));
    allVals.push(...values.filter(v => v !== null));
    return {field, values, color: colors[fi % colors.length]};
  });

  if (!allVals.length) return;
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const rangeV = maxV - minV || 1;

  // Y 轴
  ctx.fillStyle = '#4b5563';
  ctx.font = '10px monospace';
  for (let i = 0; i <= 4; i++) {
    const v = minV + (rangeV * i / 4);
    const y = pad.top + h - (i / 4) * h;
    ctx.fillText(v.toFixed(1), 2, y + 3);
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
  }

  // 曲线
  for (const s of series) {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < s.values.length; i++) {
      if (s.values[i] === null) continue;
      const x = pad.left + (i / Math.max(1, data.total_ticks - 1)) * w;
      const y = pad.top + h - ((s.values[i] - minV) / rangeV) * h;
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 图例
    const idx = series.indexOf(s);
    const ly = pad.top + 14 * idx + 8;
    ctx.fillStyle = s.color;
    ctx.fillRect(pad.left + w + 8, ly - 4, 10, 10);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '10px monospace';
    ctx.fillText(s.field.split('.').pop(), pad.left + w + 22, ly + 5);
  }

  // 当前 tick 指示线
  if (data.total_ticks > 1) {
    const cx = pad.left + (currentTick / (data.total_ticks - 1)) * w;
    ctx.strokeStyle = '#ffffff55';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + h); ctx.stroke();
    ctx.setLineDash([]);
    // tick 标记
    ctx.fillStyle = '#60a5fa';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`t=${currentTick}`, cx + 3, pad.top + h + 14);
  }
}

// ========== 控制逻辑 ==========
function goToTick(t) {
  currentTick = Math.max(0, Math.min(t, data.total_ticks - 1));
  timeline.value = currentTick;
  tickDisplay.textContent = `tick ${currentTick} / ${data.total_ticks - 1}`;
  renderEventLog();
  renderState();
  renderSpatial();
  renderChart();
}

$('btn-start').onclick = () => goToTick(0);
$('btn-end').onclick = () => goToTick(data.total_ticks - 1);
$('btn-prev').onclick = () => goToTick(currentTick - 1);
$('btn-next').onclick = () => goToTick(currentTick + 1);
$('btn-play').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸' : '▶';
  this.classList.toggle('active', playing);
  if (playing) {
    const spd = parseInt($('speed').value);
    playTimer = setInterval(() => {
      if (currentTick >= data.total_ticks - 1) { this.click(); return; }
      goToTick(currentTick + 1);
    }, spd);
  } else clearInterval(playTimer);
};
$('speed').onchange = function() {
  if (playing) { $('btn-play').click(); $('btn-play').click(); } // 重启计时器
};
timeline.oninput = () => goToTick(parseInt(timeline.value));

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goToTick(currentTick - 1);
  else if (e.key === 'ArrowRight') goToTick(currentTick + 1);
  else if (e.key === ' ') { e.preventDefault(); $('btn-play').click(); }
  else if (e.key === 'Home') goToTick(0);
  else if (e.key === 'End') goToTick(data.total_ticks - 1);
});

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function diffObj(before, after, prefix = '') {
  const diffs = [];
  if (!before || typeof before !== 'object') return diffs;
  for (const k of new Set([...Object.keys(before || {}), ...Object.keys(after || {})])) {
    const p = prefix ? prefix + '.' + k : k;
    const b = before?.[k], a = after?.[k];
    if (JSON.stringify(b) === JSON.stringify(a)) continue;
    if (typeof b === 'object' && typeof a === 'object' && b && a && !Array.isArray(b)) diffs.push(...diffObj(b, a, p));
    else diffs.push(`${p}: ${JSON.stringify(b)} → ${JSON.stringify(a)}`);
  }
  return diffs;
}

analyzeData();
goToTick(0);
window.addEventListener('resize', () => { renderSpatial(); renderChart(); });
</script>
