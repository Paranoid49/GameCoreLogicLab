<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>GameCoreLogicLab - 回放查看器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #111827; color: #e5e7eb; display: flex; flex-direction: column; height: 100vh; }

/* 顶部控制栏 */
#controls {
  padding: 10px 16px; background: #1f2937; border-bottom: 2px solid #374151;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#controls button {
  background: #374151; border: 1px solid #4b5563; color: #e5e7eb;
  padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 13px;
}
#controls button:hover { background: #4b5563; }
#controls button.active { background: #2563eb; border-color: #3b82f6; }
#timeline { flex: 1; accent-color: #3b82f6; }
#tick-display { min-width: 120px; text-align: center; color: #60a5fa; font-weight: bold; }
#speed-group { display: flex; gap: 4px; align-items: center; }
#speed-group label { color: #9ca3af; font-size: 12px; }
#speed { background: #374151; border: 1px solid #4b5563; color: #e5e7eb; padding: 3px 6px; border-radius: 4px; }

/* 主体区域 */
#main { display: flex; flex: 1; overflow: hidden; }

/* 左栏：事件日志 */
#event-panel { width: 280px; border-right: 2px solid #374151; display: flex; flex-direction: column; flex-shrink: 0; }
#event-panel .panel-header { padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151; font-size: 13px; color: #9ca3af; font-weight: bold; }
#event-log { flex: 1; overflow-y: auto; padding: 6px; font-size: 12px; }
.tick-group { margin-bottom: 2px; }
.tick-header {
  color: #60a5fa; font-weight: bold; cursor: pointer; padding: 3px 6px;
  border-radius: 3px; font-size: 12px; display: flex; align-items: center; gap: 6px;
}
.tick-header:hover { background: #1f2937; }
.tick-header.active { background: #1e3a5f; border-left: 3px solid #3b82f6; }
.tick-header .tick-num { min-width: 50px; }
.tick-header .tick-summary { color: #6b7280; font-weight: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tick-event { padding: 1px 6px 1px 24px; color: #d1d5db; font-size: 11px; }
.tick-diff { padding: 1px 6px 1px 30px; color: #4ade80; font-size: 11px; }
.tick-diff.negative { color: #f87171; }

/* 中栏：可视化 */
#viz-panel { flex: 1; display: flex; flex-direction: column; }

/* 空间画布 */
#canvas-section { flex: 1; position: relative; border-bottom: 2px solid #374151; }
#canvas-section .panel-header { position: absolute; top: 0; left: 0; right: 0; padding: 6px 12px; background: rgba(31,41,55,0.85); z-index: 1; font-size: 13px; color: #9ca3af; font-weight: bold; }
#spatial-canvas { width: 100%; height: 100%; background: #0f172a; cursor: crosshair; }
#no-spatial { display: flex; align-items: center; justify-content: center; height: 100%; color: #4b5563; font-size: 14px; background: #0f172a; }
#entity-legend {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  display: flex; flex-wrap: wrap; gap: 6px; z-index: 2;
}
.legend-item {
  display: flex; align-items: center; gap: 4px; padding: 2px 8px;
  background: #1f293799; border-radius: 4px; font-size: 11px; cursor: pointer;
  border: 1px solid transparent; transition: all 0.15s;
}
.legend-item:hover { background: #1f2937; }
.legend-item.active { border-color: #fff; background: #1f2937; }
.legend-item.dimmed { opacity: 0.3; }
.legend-shape { width: 12px; height: 12px; display: inline-block; }

/* 数值图表 */
#chart-section { height: 200px; border-bottom: 2px solid #374151; position: relative; }
#chart-section .panel-header { padding: 6px 12px; background: #1f2937; border-bottom: 1px solid #374151; font-size: 13px; color: #9ca3af; font-weight: bold; }
#chart-canvas { width: 100%; height: calc(100% - 30px); background: #0f172a; }

/* 右栏：状态面板 */
#state-panel { width: 320px; border-left: 2px solid #374151; display: flex; flex-direction: column; flex-shrink: 0; }
#state-panel .panel-header { padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151; font-size: 13px; color: #9ca3af; font-weight: bold; }
#state-content { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 12px; }
.state-entity { margin-bottom: 10px; border: 1px solid #374151; border-radius: 4px; overflow: hidden; }
.state-entity-header { background: #1f2937; padding: 4px 8px; font-weight: bold; color: #60a5fa; font-size: 12px; display: flex; justify-content: space-between; cursor: pointer; }
.state-entity-header .entity-badge { background: #374151; padding: 1px 6px; border-radius: 8px; font-size: 10px; color: #9ca3af; }
.state-entity-body { padding: 4px 8px; }
.state-row { display: flex; justify-content: space-between; padding: 1px 0; border-bottom: 1px solid #1f2937; }
.state-key { color: #9ca3af; }
.state-val { color: #e5e7eb; }
.state-changed { color: #fbbf24; font-weight: bold; }
.state-increased { color: #4ade80; }
.state-decreased { color: #f87171; }

/* 底部状态栏 */
#status-bar { padding: 4px 16px; background: #1f2937; border-top: 1px solid #374151; font-size: 11px; color: #6b7280; display: flex; gap: 20px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="controls">
  <button id="btn-start" title="跳到开头">⏮</button>
  <button id="btn-prev" title="上一 tick">◀</button>
  <button id="btn-play" title="播放/暂停">▶</button>
  <button id="btn-next" title="下一 tick">▶</button>
  <button id="btn-end" title="跳到末尾">⏭</button>
  <input type="range" id="timeline" min="0" value="0">
  <span id="tick-display">帧 0 / 0</span>
  <div id="speed-group">
    <label>速度:</label>
    <select id="speed">
      <option value="500">2 帧/秒</option>
      <option value="200">5 帧/秒</option>
      <option value="100">10 帧/秒</option>
      <option value="33" selected>30 帧/秒</option>
      <option value="16">60 帧/秒</option>
      <option value="8">120 帧/秒</option>
      <option value="1">最大</option>
    </select>
  </div>
</div>

<div id="main">
  <div id="event-panel">
    <div class="panel-header">事件日志</div>
    <div id="event-log"></div>
  </div>

  <div id="viz-panel">
    <div id="canvas-section">
      <div class="panel-header">空间视图 <span id="canvas-hint" style="font-weight:normal;font-size:11px;color:#4b5563">（点击实体高亮，再次点击取消）</span></div>
      <canvas id="spatial-canvas"></canvas>
      <div id="no-spatial">未检测到空间数据（position/center 字段）</div>
      <div id="entity-legend"></div>
    </div>
    <div id="chart-section">
      <div class="panel-header">数值趋势</div>
      <canvas id="chart-canvas"></canvas>
    </div>
  </div>

  <div id="state-panel">
    <div class="panel-header">实体状态 <span id="state-tick-label"></span></div>
    <div id="state-content"></div>
  </div>
</div>

<div id="status-bar">
  <span id="status-total"></span>
  <span id="status-violations"></span>
  <span id="status-result"></span>
</div>

<script>
/*__REPLAY_DATA__*/

const data = (typeof REPLAY_DATA !== 'undefined') ? REPLAY_DATA : {ticks: [], total_ticks: 0};
let currentTick = 0;
let playing = false;
let playTimer = null;
let hasSpatial = false;
let numericPaths = [];

const $ = id => document.getElementById(id);
const timeline = $('timeline');
const tickDisplay = $('tick-display');
const eventLog = $('event-log');
const stateContent = $('state-content');
const spatialCanvas = $('spatial-canvas');
const chartCanvas = $('chart-canvas');
const noSpatial = $('no-spatial');

timeline.max = Math.max(0, data.total_ticks - 1);

// 状态栏
$('status-total').textContent = `总帧数: ${data.total_ticks}`;
const vCount = (data.invariant_violations || []).length;
$('status-violations').textContent = `不变量违反: ${vCount}`;
$('status-result').textContent = data.passed ? '✓ 通过' : '✗ 未通过';
$('status-result').style.color = data.passed ? '#4ade80' : '#f87171';

// ========== 数据分析 ==========
function analyzeData() {
  if (!data.ticks.length) return;
  const sample = data.ticks[0].state_after;
  hasSpatial = detectSpatial(sample);
  noSpatial.style.display = hasSpatial ? 'none' : 'flex';
  spatialCanvas.style.display = hasSpatial ? 'block' : 'none';
  numericPaths = detectNumericPaths(sample).slice(0, 8);
}

const SPATIAL_KEYS = ['position','pos','location','loc','center','origin','point'];

function detectSpatial(obj, key) {
  if (!obj || typeof obj !== 'object') return false;
  // 对象格式 {x, y}
  if ('x' in obj && 'y' in obj && typeof obj.x === 'number') return true;
  // 数组格式 [x, y] 或 [x, y, z]，字段名匹配空间关键词
  if (Array.isArray(obj) && obj.length >= 2 && typeof obj[0] === 'number' && SPATIAL_KEYS.includes(key)) return true;
  for (const [k, v] of Object.entries(obj)) {
    if (typeof v === 'object' && v !== null) {
      if (Array.isArray(v)) {
        // 数组值：检查是否是坐标数组，或递归检查数组元素
        if (v.length >= 2 && v.length <= 4 && typeof v[0] === 'number' && SPATIAL_KEYS.includes(k)) return true;
        for (const item of v) if (detectSpatial(item, k)) return true;
      }
      else if (detectSpatial(v, k)) return true;
    }
  }
  return false;
}

function detectNumericPaths(obj, prefix = '', result = []) {
  if (!obj || typeof obj !== 'object') return result;
  for (const [k, v] of Object.entries(obj)) {
    const p = prefix ? prefix + '.' + k : k;
    if (typeof v === 'number') result.push(p);
    else if (typeof v === 'object' && v !== null && !Array.isArray(v)) detectNumericPaths(v, p, result);
  }
  return result;
}

function getVal(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : null, obj);
}

// ========== 事件日志 ==========
function renderEventLog() {
  let html = '';
  for (const tick of data.ticks) {
    const isActive = tick.tick === currentTick;
    const cls = isActive ? ' active' : '';
    const summary = (tick.events || []).length ? tick.events[0].substring(0, 30) : '';
    html += `<div class="tick-group">`;
    html += `<div class="tick-header${cls}" onclick="goToTick(${tick.tick})"><span class="tick-num">帧 ${tick.tick}</span><span class="tick-summary">${escHtml(summary)}</span></div>`;
    if (isActive) {
      for (const ev of tick.events || []) html += `<div class="tick-event">${escHtml(ev)}</div>`;
      for (const d of diffObj(tick.state_before, tick.state_after).slice(0, 15)) {
        const cls2 = d.includes('→') && parseFloat(d.split('→')[1]) < parseFloat(d.split('→')[0].split(':').pop()) ? ' negative' : '';
        html += `<div class="tick-diff${cls2}">${escHtml(d)}</div>`;
      }
    }
    html += `</div>`;
  }
  eventLog.innerHTML = html;
  const active = eventLog.querySelector('.active');
  if (active) active.scrollIntoView({block: 'nearest', behavior: 'smooth'});
}

// ========== 状态面板 ==========
function renderState() {
  if (!data.ticks.length) { stateContent.innerHTML = '无数据'; return; }
  const tick = data.ticks[currentTick];
  if (!tick) return;
  $('state-tick-label').textContent = `(帧 ${currentTick})`;
  const state = tick.state_after;
  const prev = tick.state_before;
  stateContent.innerHTML = buildStateHtml(state, prev);
}

function buildStateHtml(state, prev) {
  // 尝试识别实体列表（数组型）或单一状态
  let html = '';
  for (const [k, v] of Object.entries(state)) {
    if (Array.isArray(v) && v.length > 0 && typeof v[0] === 'object') {
      // 实体列表
      const prevArr = prev ? prev[k] || [] : [];
      for (let i = 0; i < v.length; i++) {
        const entity = v[i];
        const prevEntity = prevArr[i] || {};
        const label = entity.name || entity.id || `${k}[${i}]`;
        html += renderEntityCard(label, entity, prevEntity, i);
      }
    } else if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
      const prevV = prev ? prev[k] || {} : {};
      html += renderEntityCard(k, v, prevV, 0);
    } else {
      const prevV = prev ? prev[k] : undefined;
      const changed = JSON.stringify(v) !== JSON.stringify(prevV);
      const cls = changed ? getChangeClass(prevV, v) : '';
      html += `<div class="state-row"><span class="state-key">${k}</span><span class="state-val${cls}">${JSON.stringify(v)}</span></div>`;
    }
  }
  return html;
}

function renderEntityCard(label, entity, prevEntity, colorIdx) {
  const colors = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];
  const color = colors[colorIdx % colors.length];
  let html = `<div class="state-entity">`;
  html += `<div class="state-entity-header" style="border-left:3px solid ${color}"><span>${escHtml(String(label))}</span></div>`;
  html += `<div class="state-entity-body">`;
  for (const [k, v] of Object.entries(entity)) {
    if (typeof v === 'object' && v !== null) continue; // 跳过嵌套对象
    const prevV = prevEntity[k];
    const changed = JSON.stringify(v) !== JSON.stringify(prevV);
    const cls = changed ? getChangeClass(prevV, v) : '';
    html += `<div class="state-row"><span class="state-key">${k}</span><span class="state-val${cls}">${v}</span></div>`;
  }
  html += `</div></div>`;
  return html;
}

function getChangeClass(prevV, newV) {
  if (typeof prevV === 'number' && typeof newV === 'number') {
    return newV > prevV ? ' state-increased' : newV < prevV ? ' state-decreased' : ' state-changed';
  }
  return ' state-changed';
}

// ========== 空间渲染 ==========
const ENTITY_COLORS = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];
const ENTITY_SHAPES = ['circle','square','diamond','triangle','pentagon','hexagon','star','cross'];
let selectedEntity = -1;
let entityRegistry = [];

function buildEntityRegistry() {
  if (!data.ticks.length) return;
  const first = []; collectPositions(data.ticks[0].state_after, first);
  entityRegistry = first.map((p, i) => ({
    id: i, label: p.label || `#${i}`,
    color: ENTITY_COLORS[i % ENTITY_COLORS.length],
    shape: ENTITY_SHAPES[i % ENTITY_SHAPES.length],
  }));
  renderLegend();
}

function renderLegend() {
  const legend = document.getElementById('entity-legend');
  legend.innerHTML = entityRegistry.map((e, i) => {
    const ac = selectedEntity === i ? ' active' : '';
    const dm = selectedEntity >= 0 && selectedEntity !== i ? ' dimmed' : '';
    return `<div class="legend-item${ac}${dm}" onclick="toggleEntity(${i})"><canvas class="legend-shape" width="12" height="12" data-shape="${e.shape}" data-color="${e.color}"></canvas><span>${escHtml(e.label)}</span></div>`;
  }).join('');
  legend.querySelectorAll('.legend-shape').forEach(c => {
    drawShape(c.getContext('2d'), 6, 6, 5, c.dataset.shape, c.dataset.color);
  });
}

function toggleEntity(idx) {
  selectedEntity = selectedEntity === idx ? -1 : idx;
  renderLegend(); renderSpatial();
}

function drawShape(ctx, cx, cy, r, shape, color, stroke) {
  ctx.fillStyle = color; ctx.beginPath();
  switch (shape) {
    case 'circle': ctx.arc(cx, cy, r, 0, Math.PI*2); break;
    case 'square': ctx.rect(cx-r, cy-r, r*2, r*2); break;
    case 'diamond': ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy); ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy); ctx.closePath(); break;
    case 'triangle': ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy+r*0.7); ctx.lineTo(cx-r,cy+r*0.7); ctx.closePath(); break;
    case 'pentagon': for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;ctx[i?'lineTo':'moveTo'](cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();break;
    case 'hexagon': for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx[i?'lineTo':'moveTo'](cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();break;
    case 'star': for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5;const sr=i%2?r*0.4:r;ctx[i?'lineTo':'moveTo'](cx+sr*Math.cos(a),cy+sr*Math.sin(a));}ctx.closePath();break;
    case 'cross': const w=r*0.35;ctx.moveTo(cx-w,cy-r);ctx.lineTo(cx+w,cy-r);ctx.lineTo(cx+w,cy-w);ctx.lineTo(cx+r,cy-w);ctx.lineTo(cx+r,cy+w);ctx.lineTo(cx+w,cy+w);ctx.lineTo(cx+w,cy+r);ctx.lineTo(cx-w,cy+r);ctx.lineTo(cx-w,cy+w);ctx.lineTo(cx-r,cy+w);ctx.lineTo(cx-r,cy-w);ctx.lineTo(cx-w,cy-w);ctx.closePath();break;
  }
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function renderSpatial() {
  if (!hasSpatial || !data.ticks.length) return;
  const ctx = spatialCanvas.getContext('2d');
  const rect = spatialCanvas.parentElement.getBoundingClientRect();
  spatialCanvas.width = rect.width;
  spatialCanvas.height = rect.height - 60;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, spatialCanvas.width, spatialCanvas.height);

  const state = data.ticks[currentTick].state_after;

  // 收集所有空间坐标确定视口范围
  const allCoords = [];
  for (const tick of data.ticks) {
    const s = tick.state_after;
    collectAllCoords(s, allCoords);
  }
  if (!allCoords.length) return;

  const pad = 60;
  const minX = Math.min(...allCoords.map(c=>c.x))-5, maxX = Math.max(...allCoords.map(c=>c.x))+5;
  const minY = Math.min(...allCoords.map(c=>c.y))-5, maxY = Math.max(...allCoords.map(c=>c.y))+5;
  const w = spatialCanvas.width-pad*2, h = spatialCanvas.height-pad*2;
  const scale = Math.min(w/(maxX-minX||1), h/(maxY-minY||1));
  const ox = pad+(w-(maxX-minX)*scale)/2, oy = pad+(h-(maxY-minY)*scale)/2;
  // Y 轴翻转：屏幕 Y 向下，游戏 Y 向上
  const toS = (x,y) => [ox+(x-minX)*scale, oy+(maxY-y)*scale];

  // --- 网格 + 坐标轴 ---
  ctx.strokeStyle='#1e293b'; ctx.lineWidth=0.5; ctx.fillStyle='#4b5563'; ctx.font='9px monospace';
  const gsX=Math.ceil((maxX-minX)/10)||1;
  for(let gx=Math.floor(minX/gsX)*gsX;gx<=maxX;gx+=gsX){
    const[sx]=toS(gx,minY);ctx.beginPath();ctx.moveTo(sx,pad);ctx.lineTo(sx,spatialCanvas.height-pad);ctx.stroke();
    ctx.fillText(gx.toFixed(0),sx-8,spatialCanvas.height-pad+14);
  }
  const gsY=Math.ceil((maxY-minY)/10)||1;
  for(let gy=Math.floor(minY/gsY)*gsY;gy<=maxY;gy+=gsY){
    const[,sy]=toS(minX,gy);ctx.beginPath();ctx.moveTo(pad,sy);ctx.lineTo(spatialCanvas.width-pad,sy);ctx.stroke();
    ctx.fillText(gy.toFixed(0),4,sy+3);
  }
  // 轴标签
  ctx.fillStyle='#6b7280'; ctx.font='bold 11px monospace';
  ctx.fillText('X', spatialCanvas.width-pad+5, spatialCanvas.height-pad+4);
  ctx.fillText('Y', pad-15, pad-8);

  // --- 第1层：区域（zones）---
  const zones = findArray(state, 'zones') || findArray(state, 'regions') || [];
  const zoneColors = ['#3b82f644','#ef444444','#22c55e44','#eab30844','#a855f744'];
  zones.forEach((zone, zi) => {
    const center = getVec(zone, 'center') || getVec(zone, 'position');
    if (!center) return;
    const [cx, cy] = toS(center[0], center[1]);
    const halfExt = zone.half_extents || zone.halfExtents || zone.size;
    const shape = zone.shape || 'box';
    const color = zoneColors[zi % zoneColors.length];
    const borderColor = color.slice(0,7) + 'aa';

    if (halfExt) {
      const hw = Math.abs(halfExt[0]) * scale;
      const hh = Math.abs(halfExt[1] || halfExt[0]) * scale;
      ctx.fillStyle = color;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 3]);
      if (shape === 'sphere' || shape === 'circle') {
        ctx.beginPath(); ctx.arc(cx, cy, hw, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      } else {
        ctx.fillRect(cx-hw, cy-hh, hw*2, hh*2);
        ctx.strokeRect(cx-hw, cy-hh, hw*2, hh*2);
      }
      ctx.setLineDash([]);
    }

    // 区域名称
    const label = zone.name || zone.id || `区域${zi}`;
    ctx.fillStyle = borderColor.slice(0,7);
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, cy - (halfExt ? Math.abs(halfExt[1]||halfExt[0])*scale + 8 : 12));

    // 区域内重力方向箭头
    const grav = zone.gravity_override || zone.gravity || zone.gravityOverride;
    if (grav) {
      drawGravityArrow(ctx, cx, cy, grav, scale * 0.3, borderColor.slice(0,7));
    }
    ctx.textAlign = 'left';
  });

  // --- 第2层：全局重力方向（左上角标注）---
  const config = state.config || state.settings || {};
  const globalGrav = config.global_gravity || config.gravity || config.globalGravity;
  if (globalGrav) {
    ctx.fillStyle = '#9ca3af';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('全局重力', pad, 18);
    drawGravityArrow(ctx, pad + 80, 14, globalGrav, 15, '#f87171');
    const gStr = `(${globalGrav[0]}, ${globalGrav[1]}${globalGrav[2]!==undefined?', '+globalGrav[2]:''})`;
    ctx.fillStyle = '#6b7280'; ctx.font = '10px monospace';
    ctx.fillText(gStr, pad + 100, 18);
  }

  // --- 第3层：实体轨迹 ---
  const bodies = findArray(state, 'bodies') || findArray(state, 'entities') || findArray(state, 'objects') || [];
  const bodyColors = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];

  for(let t=0;t<=currentTick;t++){
    const s = data.ticks[t].state_after;
    const sp = data.ticks[t].state_before;
    const bAfter = findArray(s, 'bodies') || findArray(s, 'entities') || findArray(s, 'objects') || [];
    const bBefore = findArray(sp, 'bodies') || findArray(sp, 'entities') || findArray(sp, 'objects') || [];
    const alpha = 0.1 + 0.5*(t/Math.max(1,currentTick));
    for(let i=0;i<Math.min(bAfter.length,bBefore.length);i++){
      if(selectedEntity>=0&&i!==selectedEntity)continue;
      const posA = getVec(bAfter[i],'position') || getVec(bAfter[i],'pos');
      const posB = getVec(bBefore[i],'position') || getVec(bBefore[i],'pos');
      if(!posA||!posB)continue;
      const color = bodyColors[i%bodyColors.length];
      ctx.strokeStyle=color+Math.round(alpha*255).toString(16).padStart(2,'0');
      ctx.lineWidth=selectedEntity===i?3:2;
      const[x1,y1]=toS(posB[0],posB[1]),[x2,y2]=toS(posA[0],posA[1]);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    }
  }

  // --- 第4层：当前帧实体标记 ---
  const curBodies = findArray(state, 'bodies') || findArray(state, 'entities') || findArray(state, 'objects') || [];
  curBodies.forEach((body, i) => {
    const pos = getVec(body, 'position') || getVec(body, 'pos');
    if (!pos) return;
    const [sx, sy] = toS(pos[0], pos[1]);
    const color = bodyColors[i % bodyColors.length];
    const isDimmed = selectedEntity >= 0 && selectedEntity !== i;
    const isSel = selectedEntity === i;
    const sz = isSel ? 12 : 8;

    if (isDimmed) { ctx.globalAlpha = 0.15; }

    // 实体圆点（实心，区别于区域的虚线框）
    ctx.fillStyle = color + '33';
    ctx.beginPath(); ctx.arc(sx, sy, sz + 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI*2); ctx.stroke();

    if (isSel) {
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, sz + 10, 0, Math.PI*2); ctx.stroke();
    }

    // 实体名称（中文优先，fallback 到 id）
    const label = body.name || body.id || `实体${i}`;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(label, sx, sy - sz - 6);

    // 速度方向箭头
    const vel = getVec(body, 'velocity') || getVec(body, 'vel');
    if (vel && (Math.abs(vel[0]) > 0.01 || Math.abs(vel[1]) > 0.01)) {
      const vLen = Math.sqrt(vel[0]*vel[0] + vel[1]*vel[1]);
      const arrowLen = Math.min(30, vLen * scale * 0.15);
      const nx = vel[0]/vLen, ny = vel[1]/vLen;
      const ex = sx + nx * arrowLen, ey = sy - ny * arrowLen; // Y 翻转
      ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
      // 箭头头部
      const headLen = 6, angle = Math.atan2(-(ny), nx);
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - headLen*Math.cos(angle-0.4), ey + headLen*Math.sin(angle-0.4));
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - headLen*Math.cos(angle+0.4), ey + headLen*Math.sin(angle+0.4));
      ctx.stroke();
    }

    // 坐标
    if (isSel || curBodies.length <= 3) {
      ctx.fillStyle = '#9ca3af'; ctx.font = '10px monospace';
      ctx.fillText(`(${pos[0].toFixed(1)}, ${pos[1].toFixed(1)})`, sx, sy + sz + 14);
    }
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  });
}

// --- 辅助函数 ---
function drawGravityArrow(ctx, cx, cy, grav, arrowScale, color) {
  const gx = grav[0], gy = grav[1];
  if (Math.abs(gx) < 0.001 && Math.abs(gy) < 0.001) return;
  const len = Math.sqrt(gx*gx + gy*gy);
  const nx = gx/len, ny = gy/len;
  const aLen = Math.min(25, len * arrowScale);
  const ex = cx + nx * aLen, ey = cy - ny * aLen; // Y 翻转
  ctx.strokeStyle = color; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();
  const headLen = 7, angle = Math.atan2(-ny, nx);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - headLen*Math.cos(angle-0.5), ey + headLen*Math.sin(angle-0.5));
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - headLen*Math.cos(angle+0.5), ey + headLen*Math.sin(angle+0.5));
  ctx.stroke();
}

function findArray(obj, key) {
  if (!obj || typeof obj !== 'object') return null;
  if (Array.isArray(obj[key])) return obj[key];
  for (const v of Object.values(obj)) {
    if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
      const found = findArray(v, key);
      if (found) return found;
    }
  }
  return null;
}

function getVec(obj, key) {
  if (!obj) return null;
  const v = obj[key];
  if (Array.isArray(v) && v.length >= 2 && typeof v[0] === 'number') return v;
  if (v && typeof v === 'object' && 'x' in v) return [v.x, v.y, v.z || 0];
  return null;
}

function collectAllCoords(obj, result) {
  if (!obj || typeof obj !== 'object') return;
  for (const [k, v] of Object.entries(obj)) {
    if (Array.isArray(v) && v.length >= 2 && v.length <= 4 && typeof v[0] === 'number' && SPATIAL_KEYS.includes(k)) {
      result.push({x: v[0], y: v[1]});
    } else if (v && typeof v === 'object' && 'x' in v && typeof v.x === 'number') {
      result.push({x: v.x, y: v.y});
    } else if (Array.isArray(v)) {
      v.forEach(item => collectAllCoords(item, result));
    } else if (typeof v === 'object' && v !== null) {
      collectAllCoords(v, result);
    }
  }
}

spatialCanvas.addEventListener('click', e=>{
  if(!data.ticks.length)return;
  const rect=spatialCanvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const curPos=[];collectPositions(data.ticks[currentTick].state_after,curPos);
  const allPos=[];for(const tick of data.ticks)collectPositions(tick.state_after,allPos);
  if(!allPos.length)return;
  const pad=50;
  const minX=Math.min(...allPos.map(p=>p.x))-5,maxX=Math.max(...allPos.map(p=>p.x))+5;
  const minY=Math.min(...allPos.map(p=>p.y))-5,maxY=Math.max(...allPos.map(p=>p.y))+5;
  const w=spatialCanvas.width-pad*2,h=spatialCanvas.height-pad*2;
  const scale=Math.min(w/(maxX-minX||1),h/(maxY-minY||1));
  const ox=pad+(w-(maxX-minX)*scale)/2,oy=pad+(h-(maxY-minY)*scale)/2;
  let closest=-1,minDist=20;
  curPos.forEach((p,i)=>{
    const sx=ox+(p.x-minX)*scale,sy=oy+(p.y-minY)*scale;
    const dist=Math.sqrt((mx-sx)**2+(my-sy)**2);
    if(dist<minDist){minDist=dist;closest=i;}
  });
  toggleEntity(closest>=0?closest:-1);
});

function collectPositions(obj, result, label) {
  if (!obj || typeof obj !== 'object') return;
  // 对象格式 {x, y}
  if ('x' in obj && 'y' in obj && typeof obj.x === 'number') {
    result.push({x: obj.x, y: obj.y, label: label || obj.name || obj.id || ''});
    return;
  }
  for (const [k, v] of Object.entries(obj)) {
    // 数组格式 [x, y] 或 [x, y, z]，字段名匹配空间关键词
    if (Array.isArray(v) && v.length >= 2 && v.length <= 4 && typeof v[0] === 'number' && SPATIAL_KEYS.includes(k)) {
      result.push({x: v[0], y: v[1], label: label || obj.name || obj.id || ''});
    }
    // 对象数组（如 bodies 列表）
    else if (Array.isArray(v)) {
      v.forEach((item, i) => collectPositions(item, result, item?.name || item?.id || `${k}[${i}]`));
    }
    // 嵌套对象
    else if (typeof v === 'object' && v !== null) {
      collectPositions(v, result, v?.name || v?.id || k);
    }
  }
}

// ========== 数值图表 ==========
function renderChart() {
  if (!numericPaths.length || !data.ticks.length) return;
  const ctx = chartCanvas.getContext('2d');
  const rect = chartCanvas.parentElement.getBoundingClientRect();
  chartCanvas.width = rect.width;
  chartCanvas.height = rect.height - 30;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, chartCanvas.width, chartCanvas.height);

  const colors = ['#3b82f6','#ef4444','#22c55e','#eab308','#a855f7','#ec4899','#06b6d4','#f97316'];
  const pad = {top: 15, right: 100, bottom: 25, left: 55};
  const w = chartCanvas.width - pad.left - pad.right;
  const h = chartCanvas.height - pad.top - pad.bottom;

  let allVals = [];
  const series = numericPaths.map((field, fi) => {
    const values = data.ticks.map(t => getVal(t.state_after, field));
    allVals.push(...values.filter(v => v !== null));
    return {field, values, color: colors[fi % colors.length]};
  });

  if (!allVals.length) return;
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const rangeV = maxV - minV || 1;

  // Y 轴
  ctx.fillStyle = '#4b5563';
  ctx.font = '10px monospace';
  for (let i = 0; i <= 4; i++) {
    const v = minV + (rangeV * i / 4);
    const y = pad.top + h - (i / 4) * h;
    ctx.fillText(v.toFixed(1), 2, y + 3);
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
  }

  // 曲线
  for (const s of series) {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < s.values.length; i++) {
      if (s.values[i] === null) continue;
      const x = pad.left + (i / Math.max(1, data.total_ticks - 1)) * w;
      const y = pad.top + h - ((s.values[i] - minV) / rangeV) * h;
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 图例
    const idx = series.indexOf(s);
    const ly = pad.top + 14 * idx + 8;
    ctx.fillStyle = s.color;
    ctx.fillRect(pad.left + w + 8, ly - 4, 10, 10);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '10px monospace';
    ctx.fillText(s.field.split('.').pop(), pad.left + w + 22, ly + 5);
  }

  // 当前 tick 指示线
  if (data.total_ticks > 1) {
    const cx = pad.left + (currentTick / (data.total_ticks - 1)) * w;
    ctx.strokeStyle = '#ffffff55';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + h); ctx.stroke();
    ctx.setLineDash([]);
    // tick 标记
    ctx.fillStyle = '#60a5fa';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(`帧=${currentTick}`, cx + 3, pad.top + h + 14);
  }
}

// ========== 控制逻辑 ==========
function goToTick(t) {
  currentTick = Math.max(0, Math.min(t, data.total_ticks - 1));
  timeline.value = currentTick;
  tickDisplay.textContent = `帧 ${currentTick} / ${data.total_ticks - 1}`;
  renderEventLog();
  renderState();
  renderSpatial();
  renderChart();
}

$('btn-start').onclick = () => goToTick(0);
$('btn-end').onclick = () => goToTick(data.total_ticks - 1);
$('btn-prev').onclick = () => goToTick(currentTick - 1);
$('btn-next').onclick = () => goToTick(currentTick + 1);
$('btn-play').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸' : '▶';
  this.classList.toggle('active', playing);
  if (playing) {
    const spd = parseInt($('speed').value);
    playTimer = setInterval(() => {
      if (currentTick >= data.total_ticks - 1) { this.click(); return; }
      goToTick(currentTick + 1);
    }, spd);
  } else clearInterval(playTimer);
};
$('speed').onchange = function() {
  if (playing) { $('btn-play').click(); $('btn-play').click(); } // 重启计时器
};
timeline.oninput = () => goToTick(parseInt(timeline.value));

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goToTick(currentTick - 1);
  else if (e.key === 'ArrowRight') goToTick(currentTick + 1);
  else if (e.key === ' ') { e.preventDefault(); $('btn-play').click(); }
  else if (e.key === 'Home') goToTick(0);
  else if (e.key === 'End') goToTick(data.total_ticks - 1);
});

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function diffObj(before, after, prefix = '') {
  const diffs = [];
  if (!before || typeof before !== 'object') return diffs;
  for (const k of new Set([...Object.keys(before || {}), ...Object.keys(after || {})])) {
    const p = prefix ? prefix + '.' + k : k;
    const b = before?.[k], a = after?.[k];
    if (JSON.stringify(b) === JSON.stringify(a)) continue;
    if (typeof b === 'object' && typeof a === 'object' && b && a && !Array.isArray(b)) diffs.push(...diffObj(b, a, p));
    else diffs.push(`${p}: ${JSON.stringify(b)} → ${JSON.stringify(a)}`);
  }
  return diffs;
}

analyzeData();
if (hasSpatial) buildEntityRegistry();
goToTick(0);
window.addEventListener('resize', () => { renderSpatial(); renderChart(); });
</script>
