<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>GameCoreLogicLab - 回放查看器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; }

/* 左侧：事件日志 */
#event-panel { width: 35%; border-right: 1px solid #333; display: flex; flex-direction: column; }
#event-panel h3 { padding: 12px; background: #16213e; border-bottom: 1px solid #333; }
#event-log { flex: 1; overflow-y: auto; padding: 8px; font-size: 13px; }
.event-tick { margin-bottom: 12px; }
.event-tick-header { color: #00d2ff; font-weight: bold; cursor: pointer; padding: 4px; border-radius: 4px; }
.event-tick-header:hover { background: #16213e; }
.event-tick-header.active { background: #0f3460; }
.event-item { padding: 2px 8px 2px 20px; color: #b0b0b0; }
.event-diff { padding: 1px 8px 1px 28px; color: #7a7; font-size: 12px; }

/* 右侧：可视化区域 */
#viz-panel { flex: 1; display: flex; flex-direction: column; }

/* 播放控制栏 */
#controls { padding: 12px; background: #16213e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
#controls button { background: #0f3460; border: 1px solid #555; color: #e0e0e0; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 14px; }
#controls button:hover { background: #1a5276; }
#timeline { flex: 1; }
#tick-display { min-width: 100px; text-align: center; color: #00d2ff; }

/* 画布区域（空间层） */
#canvas-container { flex: 1; position: relative; min-height: 200px; }
#spatial-canvas { width: 100%; height: 100%; background: #0a0a1a; }
#no-spatial { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 16px; }

/* 状态面板 + 数值图表 */
#bottom-panel { display: flex; height: 35%; border-top: 1px solid #333; }
#state-panel { width: 50%; overflow-y: auto; padding: 12px; border-right: 1px solid #333; }
#state-panel h3 { margin-bottom: 8px; color: #00d2ff; }
.state-field { padding: 2px 0; font-size: 13px; }
.state-key { color: #999; }
.state-val { color: #e0e0e0; }
.state-changed { color: #ff6b6b; font-weight: bold; }

/* 数值图表 */
#chart-panel { flex: 1; padding: 12px; }
#chart-panel h3 { margin-bottom: 8px; color: #00d2ff; }
#chart-canvas { width: 100%; height: calc(100% - 30px); }
</style>
</head>
<body>

<div id="event-panel">
  <h3>事件日志</h3>
  <div id="event-log"></div>
</div>

<div id="viz-panel">
  <div id="controls">
    <button id="btn-prev">◀</button>
    <button id="btn-play">▶ 播放</button>
    <button id="btn-next">▶</button>
    <input type="range" id="timeline" min="0" value="0">
    <span id="tick-display">tick 0 / 0</span>
    <select id="speed">
      <option value="2000">0.5x</option>
      <option value="1000" selected>1x</option>
      <option value="500">2x</option>
      <option value="200">5x</option>
    </select>
  </div>

  <div id="canvas-container">
    <canvas id="spatial-canvas"></canvas>
    <div id="no-spatial">未检测到空间数据（Position 字段）</div>
  </div>

  <div id="bottom-panel">
    <div id="state-panel">
      <h3>当前状态</h3>
      <div id="state-content"></div>
    </div>
    <div id="chart-panel">
      <h3>数值趋势</h3>
      <canvas id="chart-canvas"></canvas>
    </div>
  </div>
</div>

<script>
/*__REPLAY_DATA__*/

// ========== 初始化 ==========
const data = (typeof REPLAY_DATA !== 'undefined') ? REPLAY_DATA : {ticks: [], total_ticks: 0};
let currentTick = 0;
let playing = false;
let playTimer = null;
let hasSpatial = false;
let numericFields = [];

const timeline = document.getElementById('timeline');
const tickDisplay = document.getElementById('tick-display');
const eventLog = document.getElementById('event-log');
const stateContent = document.getElementById('state-content');
const spatialCanvas = document.getElementById('spatial-canvas');
const chartCanvas = document.getElementById('chart-canvas');
const noSpatial = document.getElementById('no-spatial');

timeline.max = Math.max(0, data.total_ticks - 1);

// ========== 数据分析 ==========
function analyzeData() {
  if (data.ticks.length === 0) return;
  const sample = data.ticks[0].state_after;
  // 检测空间数据（含 x, y 字段的对象）
  hasSpatial = detectSpatial(sample);
  if (hasSpatial) {
    noSpatial.style.display = 'none';
  } else {
    spatialCanvas.style.display = 'none';
  }
  // 检测数值字段
  numericFields = detectNumericFields(sample);
}

function detectSpatial(obj, path = '') {
  if (obj === null || typeof obj !== 'object') return false;
  if ('x' in obj && 'y' in obj && typeof obj.x === 'number') return true;
  for (const [k, v] of Object.entries(obj)) {
    if (typeof v === 'object' && v !== null) {
      if (detectSpatial(v, path + '.' + k)) return true;
    }
    if (Array.isArray(v)) {
      for (const item of v) {
        if (detectSpatial(item, path + '.' + k + '[]')) return true;
      }
    }
  }
  return false;
}

function detectNumericFields(obj, path = '', result = []) {
  if (obj === null || typeof obj !== 'object') return result;
  for (const [k, v] of Object.entries(obj)) {
    const p = path ? path + '.' + k : k;
    if (typeof v === 'number') result.push(p);
    else if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
      detectNumericFields(v, p, result);
    }
  }
  return result;
}

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : null, obj);
}

// ========== 渲染 ==========
function renderEventLog() {
  let html = '';
  for (const tick of data.ticks) {
    const isActive = tick.tick === currentTick ? ' active' : '';
    html += `<div class="event-tick">`;
    html += `<div class="event-tick-header${isActive}" onclick="goToTick(${tick.tick})">tick ${tick.tick}</div>`;
    for (const ev of tick.events || []) {
      html += `<div class="event-item">${escHtml(ev)}</div>`;
    }
    // 简略 diff
    const diffs = diffObj(tick.state_before, tick.state_after);
    for (const d of diffs.slice(0, 10)) {
      html += `<div class="event-diff">${escHtml(d)}</div>`;
    }
    html += `</div>`;
  }
  eventLog.innerHTML = html;
  // 滚动到当前 tick
  const active = eventLog.querySelector('.active');
  if (active) active.scrollIntoView({block: 'nearest'});
}

function renderState() {
  if (data.ticks.length === 0) { stateContent.innerHTML = '无数据'; return; }
  const tick = data.ticks[currentTick];
  if (!tick) return;
  const state = tick.state_after;
  const prev = tick.state_before;
  stateContent.innerHTML = renderObj(state, prev);
}

function renderObj(obj, prev, indent = 0) {
  if (obj === null || typeof obj !== 'object') return escHtml(String(obj));
  let html = '';
  const pad = '  '.repeat(indent);
  for (const [k, v] of Object.entries(obj)) {
    const prevV = prev ? prev[k] : undefined;
    const changed = JSON.stringify(v) !== JSON.stringify(prevV);
    const cls = changed ? ' state-changed' : '';
    if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
      html += `<div class="state-field">${pad}<span class="state-key">${k}:</span></div>`;
      html += renderObj(v, prevV, indent + 1);
    } else {
      html += `<div class="state-field${cls}">${pad}<span class="state-key">${k}:</span> <span class="state-val">${escHtml(JSON.stringify(v))}</span></div>`;
    }
  }
  return html;
}

// ========== 空间层渲染 ==========
function renderSpatial() {
  if (!hasSpatial || data.ticks.length === 0) return;
  const ctx = spatialCanvas.getContext('2d');
  const rect = spatialCanvas.parentElement.getBoundingClientRect();
  spatialCanvas.width = rect.width;
  spatialCanvas.height = rect.height;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, spatialCanvas.width, spatialCanvas.height);

  // 收集所有位置数据确定坐标范围
  const positions = [];
  for (const tick of data.ticks) {
    collectPositions(tick.state_after, positions);
  }
  if (positions.length === 0) return;

  const minX = Math.min(...positions.map(p => p.x)) - 10;
  const maxX = Math.max(...positions.map(p => p.x)) + 10;
  const minY = Math.min(...positions.map(p => p.y)) - 10;
  const maxY = Math.max(...positions.map(p => p.y)) + 10;
  const scaleX = spatialCanvas.width / (maxX - minX || 1);
  const scaleY = spatialCanvas.height / (maxY - minY || 1);
  const scale = Math.min(scaleX, scaleY) * 0.9;
  const offsetX = (spatialCanvas.width - (maxX - minX) * scale) / 2;
  const offsetY = (spatialCanvas.height - (maxY - minY) * scale) / 2;

  const toScreen = (x, y) => [
    offsetX + (x - minX) * scale,
    offsetY + (y - minY) * scale,
  ];

  // 画历史轨迹（淡色）
  ctx.strokeStyle = 'rgba(0, 210, 255, 0.15)';
  ctx.lineWidth = 1;
  for (let t = 0; t < currentTick; t++) {
    const posBefore = [];
    collectPositions(data.ticks[t].state_before, posBefore);
    const posAfter = [];
    collectPositions(data.ticks[t].state_after, posAfter);
    for (let i = 0; i < Math.min(posBefore.length, posAfter.length); i++) {
      const [x1, y1] = toScreen(posBefore[i].x, posBefore[i].y);
      const [x2, y2] = toScreen(posAfter[i].x, posAfter[i].y);
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
  }

  // 画当前 tick 的实体位置
  const curPositions = [];
  collectPositions(data.ticks[currentTick].state_after, curPositions);
  const colors = ['#00d2ff', '#ff6b6b', '#6bff6b', '#ffff6b', '#ff6bff'];
  curPositions.forEach((p, i) => {
    const [sx, sy] = toScreen(p.x, p.y);
    ctx.fillStyle = colors[i % colors.length];
    ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2); ctx.fill();
    if (p.label) {
      ctx.fillStyle = '#fff';
      ctx.font = '11px monospace';
      ctx.fillText(p.label, sx + 10, sy + 4);
    }
  });
}

function collectPositions(obj, result, label = '') {
  if (obj === null || typeof obj !== 'object') return;
  if ('x' in obj && 'y' in obj && typeof obj.x === 'number') {
    result.push({x: obj.x, y: obj.y, label: label || obj.name || obj.id || ''});
    return;
  }
  for (const [k, v] of Object.entries(obj)) {
    if (Array.isArray(v)) {
      v.forEach((item, i) => collectPositions(item, result, `${k}[${i}]`));
    } else if (typeof v === 'object' && v !== null) {
      collectPositions(v, result, k);
    }
  }
}

// ========== 数值图表 ==========
function renderChart() {
  if (numericFields.length === 0 || data.ticks.length === 0) return;
  const ctx = chartCanvas.getContext('2d');
  const rect = chartCanvas.parentElement.getBoundingClientRect();
  chartCanvas.width = rect.width - 24;
  chartCanvas.height = rect.height - 40;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, chartCanvas.width, chartCanvas.height);

  // 取前 6 个数值字段
  const fields = numericFields.slice(0, 6);
  const colors = ['#00d2ff', '#ff6b6b', '#6bff6b', '#ffff6b', '#ff6bff', '#ffaa6b'];
  const padding = {top: 10, right: 10, bottom: 20, left: 50};
  const w = chartCanvas.width - padding.left - padding.right;
  const h = chartCanvas.height - padding.top - padding.bottom;

  // 收集数据
  let allValues = [];
  const series = fields.map((field, fi) => {
    const values = data.ticks.map(t => getNestedValue(t.state_after, field));
    allValues.push(...values.filter(v => v !== null));
    return {field, values, color: colors[fi % colors.length]};
  });

  if (allValues.length === 0) return;
  const minV = Math.min(...allValues);
  const maxV = Math.max(...allValues);
  const rangeV = maxV - minV || 1;

  // 画每条线
  for (const s of series) {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < s.values.length; i++) {
      if (s.values[i] === null) continue;
      const x = padding.left + (i / Math.max(1, data.total_ticks - 1)) * w;
      const y = padding.top + h - ((s.values[i] - minV) / rangeV) * h;
      if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
    }
    ctx.stroke();
    // 标签
    const lastVal = s.values[s.values.length - 1];
    if (lastVal !== null) {
      ctx.fillStyle = s.color;
      ctx.font = '11px monospace';
      const shortName = s.field.split('.').pop();
      ctx.fillText(shortName, padding.left + w + 2, padding.top + h - ((lastVal - minV) / rangeV) * h + 4);
    }
  }

  // 当前 tick 标记线
  if (data.total_ticks > 1) {
    const cx = padding.left + (currentTick / (data.total_ticks - 1)) * w;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(cx, padding.top); ctx.lineTo(cx, padding.top + h); ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ========== 控制逻辑 ==========
function goToTick(t) {
  currentTick = Math.max(0, Math.min(t, data.total_ticks - 1));
  timeline.value = currentTick;
  tickDisplay.textContent = `tick ${currentTick} / ${data.total_ticks - 1}`;
  renderEventLog();
  renderState();
  renderSpatial();
  renderChart();
}

document.getElementById('btn-prev').onclick = () => goToTick(currentTick - 1);
document.getElementById('btn-next').onclick = () => goToTick(currentTick + 1);
document.getElementById('btn-play').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸ 暂停' : '▶ 播放';
  if (playing) {
    const speed = parseInt(document.getElementById('speed').value);
    playTimer = setInterval(() => {
      if (currentTick >= data.total_ticks - 1) { this.click(); return; }
      goToTick(currentTick + 1);
    }, speed);
  } else {
    clearInterval(playTimer);
  }
};
timeline.oninput = () => goToTick(parseInt(timeline.value));

// ========== 工具函数 ==========
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function diffObj(before, after, prefix = '') {
  const diffs = [];
  if (before === null || typeof before !== 'object') return diffs;
  for (const k of new Set([...Object.keys(before), ...Object.keys(after)])) {
    const p = prefix ? prefix + '.' + k : k;
    const b = before[k], a = after[k];
    if (JSON.stringify(b) === JSON.stringify(a)) continue;
    if (typeof b === 'object' && typeof a === 'object' && b !== null && a !== null && !Array.isArray(b)) {
      diffs.push(...diffObj(b, a, p));
    } else {
      diffs.push(`${p}: ${JSON.stringify(b)} → ${JSON.stringify(a)}`);
    }
  }
  return diffs;
}

// ========== 启动 ==========
analyzeData();
goToTick(0);
window.addEventListener('resize', () => { renderSpatial(); renderChart(); });
</script>
</body>
</html>
